schema: spec-driven

context: |
  Project: harness-hub
  Purpose: Deterministically migrate repository-local Claude Code and Codex harness resources from a selected Git commit.
  Primary language: Chinese documentation, with source URLs and technical names preserved in English.
  Public surface: One complete `node bin/harness-hub.mjs migrate <target> --yes` command; no partial installer or package lifecycle.
  Constraints:
    - Treat the Git checkout and commit as the only distribution and version source.
    - Keep canonical Skills under skills/<name>/ and classify them once in capabilities/index.json.
    - Keep source knowledge, docs, tests, task state, and governance out of target distribution.
    - Leave orchestration to the native Host main Agent; do not add a Router or generic Agent runtime.
    - Preserve upstream Skill bodies by default and review provenance, licenses, and security before importing third-party content.

rules:
  proposal:
    - Keep proposals concise and include non-goals when useful.
    - Call out upstream source projects and license/security considerations.
  tasks:
    - Break work into small verifiable steps.
    - Include file paths and validation commands when implementation is expected.

