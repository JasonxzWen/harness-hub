schema: spec-driven

context: |
  Project: harness-hub
  Purpose: Distribute a personal agent workflow toolkit with source records, routing overlay, and lock-backed lifecycle tooling.
  Primary language: Chinese documentation, with source URLs and technical names preserved in English.
  Initial focus: high-signal personal workflow reuse across multiple projects.
  Constraints:
    - Prefer source attribution over unattributed prompt copying.
    - Preserve upstream skill bodies by default; keep local routing and safety decisions in the overlay.
    - Keep skills focused, composable, and testable.
    - Review licenses and security posture before importing third-party content.

rules:
  proposal:
    - Keep proposals concise and include non-goals when useful.
    - Call out upstream source projects and license/security considerations.
  tasks:
    - Break work into small verifiable steps.
    - Include file paths and validation commands when implementation is expected.

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
