<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>非 ECC 原子 Skill 候选清单</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #637083;
      --line: #d8dde6;
      --accent: #256f5b;
      --accent-soft: #e7f3ef;
      --warn: #8a5a16;
      --warn-soft: #fff6df;
      --shadow: 0 12px 28px rgba(25, 34, 45, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font: 14px/1.55 "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(247, 248, 250, 0.96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 18px 22px; }
    h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: 0; }
    .lead { margin: 0; color: var(--muted); }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto auto;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }
    input[type="search"], select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 10px;
      font: inherit;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 9px 12px;
      font: inherit;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 20px 22px 44px; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat, .note, .category, .repo {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .stat { padding: 13px 14px; }
    .stat strong { display: block; font-size: 22px; }
    .stat span { color: var(--muted); }
    .note {
      margin-bottom: 16px;
      padding: 12px 14px;
      background: var(--warn-soft);
      border-color: #f0d99d;
      color: var(--warn);
    }
    .category { margin: 18px 0; overflow: hidden; }
    .category-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }
    .category h2 { margin: 0; font-size: 19px; }
    .category-count { color: var(--muted); white-space: nowrap; }
    .repo {
      margin: 12px 14px;
      box-shadow: none;
      overflow: hidden;
    }
    .repo summary {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
      list-style: none;
      background: #fff;
    }
    .repo summary::-webkit-details-marker { display: none; }
    .repo-title { font-weight: 650; }
    .repo-meta { color: var(--muted); }
    .skill-list { border-top: 1px solid var(--line); }
    .skill {
      display: grid;
      grid-template-columns: 28px minmax(160px, 240px) 1fr auto;
      gap: 10px;
      align-items: start;
      padding: 10px 14px;
      border-top: 1px solid #eef1f5;
    }
    .skill:first-child { border-top: 0; }
    .skill:hover { background: #f8fbfa; }
    .skill input { margin-top: 3px; }
    .skill-name { font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; }
    .skill-desc { color: #334155; }
    .tag {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }
    .empty {
      padding: 12px 14px;
      color: var(--muted);
      border-top: 1px solid var(--line);
    }
    .export {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }
    textarea { min-height: 180px; font-family: Consolas, "SFMono-Regular", monospace; }
    .hidden { display: none !important; }
    mark { background: #fff2a8; padding: 0 2px; }
    @media (max-width: 760px) {
      .toolbar, .summary { grid-template-columns: 1fr; }
      .skill { grid-template-columns: 28px 1fr; }
      .skill-desc, .skill .tag { grid-column: 2; }
    }
  </style>
</head>

    const selectedKey = "skillHubAtomicSelection.v1";
    function loadSelection() {
      try {
        return JSON.parse(window.localStorage.getItem(selectedKey) || "[]");
      } catch {
        return [];
      }
    }
    function persistSelection(values) {
      try {
        window.localStorage.setItem(selectedKey, JSON.stringify(values));
      } catch {
        // Some embedded browsers block localStorage for file:// pages. The page must still render.
      }
    }
    const selected = new Set(loadSelection());
    const content = document.getElementById("content");
    const search = document.getElementById("search");
    const categoryFilter = document.getElementById("categoryFilter");
    const exportBox = document.getElementById("exportBox");

    function idFor(item) {
      return `${item.c}::${item.r}::${item.s}`;
    }
    function categories() {
      return [...new Set(skills.map((item) => item.c))];
    }
    function repos(items) {
      return [...new Set(items.map((item) => item.r))];
    }
    function save() {
      persistSelection([...selected].sort());
      document.getElementById("selectedCount").textContent = selected.size;
    }
    function matches(item) {
      const q = search.value.trim().toLowerCase();
      const cat = categoryFilter.value;
      const text = `${item.c} ${item.r} ${item.s} ${item.d} ${item.t}`.toLowerCase();
      return (!cat || item.c === cat) && (!q || text.includes(q));
    }
    function makeSkillRow(item) {
      const id = idFor(item);
      const label = document.createElement("label");
      label.className = "skill";
      label.dataset.id = id;
      label.innerHTML = `
        <input type="checkbox" ${selected.has(id) ? "checked" : ""} />
        <span class="skill-name"></span>
        <span class="skill-desc"></span>
        <span class="tag"></span>
      `;
      label.querySelector(".skill-name").textContent = item.s;
      label.querySelector(".skill-desc").textContent = item.d;
      label.querySelector(".tag").textContent = item.t;
      label.querySelector("input").addEventListener("change", (event) => {
        if (event.target.checked) selected.add(id);
        else selected.delete(id);
        save();
      });
      return label;
    }
    function render() {
      const visible = skills.filter(matches);
      content.innerHTML = "";
      for (const category of categories()) {
        const catItems = visible.filter((item) => item.c === category);
        if (!catItems.length) continue;
        const section = document.createElement("section");
        section.className = "category";
        section.innerHTML = `<div class="category-head"><h2></h2><span class="category-count"></span></div>`;
        section.querySelector("h2").textContent = category;
        section.querySelector(".category-count").textContent = `${catItems.length} 个 skill`;
        for (const repo of repos(catItems)) {
          const repoItems = catItems.filter((item) => item.r === repo);
          const details = document.createElement("details");
          details.className = "repo";
          details.open = true;
          details.innerHTML = `<summary><span class="repo-title"></span><span class="repo-meta"></span></summary><div class="skill-list"></div>`;
          details.querySelector(".repo-title").textContent = repo;
          details.querySelector(".repo-meta").textContent = `${repoItems.length} 项`;
          const list = details.querySelector(".skill-list");
          for (const item of repoItems) list.appendChild(makeSkillRow(item));
          section.appendChild(details);
        }
        content.appendChild(section);
      }
      if (!visible.length) {
        const empty = document.createElement("div");
        empty.className = "note";
        empty.textContent = "没有匹配项。";
        content.appendChild(empty);
      }
      document.getElementById("totalCount").textContent = skills.length;
      document.getElementById("repoCount").textContent = repos(skills).length;
      document.getElementById("categoryCount").textContent = categories().length;
      save();
    }
    function visibleIds() {
      return skills.filter(matches).map(idFor);
    }
    function exportSelection() {
      const chosen = skills.filter((item) => selected.has(idFor(item)));
      const lines = ["# Skill Hub 原子 Skill 选择", "", "## Markdown", ""];
      for (const category of categories()) {
        const catItems = chosen.filter((item) => item.c === category);
        if (!catItems.length) continue;
        lines.push(`### ${category}`, "");
        for (const repo of repos(catItems)) {
          lines.push(`- ${repo}`);
          for (const item of catItems.filter((entry) => entry.r === repo)) {
            lines.push(`  - [ ] ${item.s}: ${item.d} (${item.t})`);
          }
        }
        lines.push("");
      }
      lines.push("## JSON", "", JSON.stringify(chosen, null, 2));
      exportBox.value = lines.join("\n");
      exportBox.focus();
      exportBox.select();
    }
    for (const category of ["", ...categories()]) {
      const option = document.createElement("option");
      option.value = category;
      option.textContent = category || "全部用途";
      categoryFilter.appendChild(option);
    }
    document.getElementById("selectVisible").addEventListener("click", () => {
      for (const id of visibleIds()) selected.add(id);
      render();
    });
    document.getElementById("clearVisible").addEventListener("click", () => {
      for (const id of visibleIds()) selected.delete(id);
      render();
    });
    document.getElementById("exportSelected").addEventListener("click", exportSelection);
    search.addEventListener("input", render);
    categoryFilter.addEventListener("change", render);
    render();
  </script>
